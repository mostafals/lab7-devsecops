name: Deploy to PROD

on:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest
    name: 🔒 Security Check
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🔍 npm audit STRICT
        run: npm audit --audit-level=moderate
        continue-on-error: false

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: security
    name: 🚀 Build & Deploy PROD
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🧪 Tests
        run: npm test -- --passWithNoTests

      - name: 🏗️ Build React PROD
        run: npm run build
        env:
          REACT_APP_ENV: production
          CI: false

      - name: 🔴 Déployer sur SLOT staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: webapp-lab7-prod-mmlll
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD_SLOT }}
          package: .

      - name: 🔄 Swap slot → Production
        uses: azure/cli@v1
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group rg-lab7-devsecops \
              --name webapp-lab7-prod-mmlll \
              --slot staging \
              --target-slot production